apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "platspec-operator.fullname" . }}
  labels:
    {{- include "platspec-operator.labels" . | nindent 4 }}
rules:
  # Full cluster-admin equivalent — blueprints can generate any resource type.
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
  - nonResourceURLs: ["*"]
    verbs: ["*"]
