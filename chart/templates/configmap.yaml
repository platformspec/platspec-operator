apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "platspec-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platspec-operator.labels" . | nindent 4 }}
data:
  config.yaml: |
    logging:
      level: {{ .Values.operator.logLevel }}
      format: {{ .Values.operator.logFormat }}

    blueprint:
      blueprint_dir: {{ .Values.blueprints.mountPath | quote }}
      cache_enabled: {{ .Values.operator.blueprintCacheEnabled }}
      kcl_timeout: {{ .Values.operator.kclTimeout }}

    operator:
      reconcile_interval: {{ .Values.operator.reconcileInterval }}
      max_workers: {{ .Values.operator.maxWorkers }}
      finalizer_name: platspec.io/finalizer
      field_manager: platspec-operator
