apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: credentials.core.platformspec.io
spec:
  group: core.platformspec.io
  names:
    kind: Credential
    listKind: CredentialList
    plural: credentials
    singular: credential
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Schema
          type: string
          jsonPath: .spec.schema
        - name: Source
          type: string
          jsonPath: .spec.source
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [schema, source]
              properties:
                schema:
                  type: string
                  description: Cloud provider schema (e.g. AWS, GCP, Azure).
                source:
                  type: string
                  description: Where credential values are fetched from.
                  enum:
                    - kubernetes-secret
                    - configmap
                    - env
                    - file
                    - aws-secrets-manager
                    - vault
                location:
                  type: string
                  description: >
                    Primary location of the credential source. Interpretation
                    depends on source: Secret name, ConfigMap name, file path,
                    Secrets Manager secret ID, or Vault path.
                fields:
                  type: object
                  description: Maps logical credential key names to source-specific key names.
                  additionalProperties:
                    type: string
                config:
                  type: object
                  description: Source-specific configuration (e.g. region for aws-secrets-manager).
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
