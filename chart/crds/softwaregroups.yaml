apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: softwaregroups.build.platformspec.io
spec:
  group: build.platformspec.io
  names:
    kind: SoftwareGroup
    listKind: SoftwareGroupList
    plural: softwaregroups
    singular: softwaregroup
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                packages:
                  type: array
                  description: List of software packages to install.
                  items:
                    type: object
                    required: [name, engine]
                    properties:
                      name:
                        type: string
                        description: Package or chart name.
                      engine:
                        type: string
                        enum: [helm, docker, custom]
                        description: Installation engine.
                      config:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                        description: Engine-specific configuration (values, image, args, etc).
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
