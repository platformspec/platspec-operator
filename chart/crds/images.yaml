apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: images.build.platformspec.io
spec:
  group: build.platformspec.io
  names:
    kind: Image
    listKind: ImageList
    plural: images
    singular: image
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Category
          type: string
          jsonPath: .spec.category
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                category:
                  type: string
                  enum: [machine, container]
                  description: Whether this is a machine image (AMI, GCE image) or a container image.
                providerRefs:
                  type: array
                  items:
                    type: object
                    required: [name]
                    properties:
                      name:
                        type: string
                      kind:
                        type: string
                        default: Provider
                environmentRefs:
                  type: array
                  items:
                    type: object
                    required: [name]
                    properties:
                      name:
                        type: string
                      kind:
                        type: string
                        default: Environment
                version:
                  type: string
                  description: Image version or tag.
                builder:
                  type: object
                  description: How to build this image (mutually exclusive with reference).
                  properties:
                    driver:
                      type: string
                      description: Build driver (e.g. packer, kaniko, docker).
                    config:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                      description: Driver-specific build configuration.
                    softwareGroups:
                      type: array
                      description: SoftwareGroup resources to install into the image.
                      items:
                        type: object
                        required: [name]
                        properties:
                          name:
                            type: string
                reference:
                  type: object
                  description: Reference to a pre-built image (mutually exclusive with builder).
                  properties:
                    id:
                      type: string
                      description: Provider-specific image identifier (e.g. ami-12345678).
                    location:
                      type: string
                      description: Registry location or URI for container images.
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
