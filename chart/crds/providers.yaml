apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: providers.core.platformspec.io
spec:
  group: core.platformspec.io
  names:
    kind: Provider
    listKind: ProviderList
    plural: providers
    singular: provider
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Category
          type: string
          jsonPath: .spec.category
        - name: Engine
          type: string
          jsonPath: .spec.engine
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [category, engine]
              properties:
                category:
                  type: string
                  description: Provider category (e.g. iaas, dns, cdn).
                engine:
                  type: string
                  description: Provider engine implementation (e.g. aws-organizations, route53).
                credentialRef:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                config:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
