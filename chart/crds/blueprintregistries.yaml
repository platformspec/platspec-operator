apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: blueprintregistries.core.platformspec.io
spec:
  group: core.platformspec.io
  names:
    kind: BlueprintRegistry
    listKind: BlueprintRegistryList
    plural: blueprintregistries
    singular: blueprintregistry
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: URL
          type: string
          jsonPath: .spec.url
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [type, url]
              properties:
                type:
                  type: string
                  enum: [oci, git, http, s3, filesystem]
                url:
                  type: string
                path:
                  type: string
                  description: >
                    Optional subdirectory within the registry root where blueprint
                    packages are located (e.g. "components/general"). When set,
                    blueprints are resolved at <path>/<name> rather than <name>.
                ref:
                  type: string
                  description: >
                    Git ref (branch, tag, or commit SHA) to use when cloning.
                    Applies to git registries only. When set, this ref is used for
                    all fetches from this registry and the blueprint version is used
                    only for cache keying. Defaults to the blueprint version when
                    not specified.
                region:
                  type: string
                  description: AWS region — required for s3 type.
                auth:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [secret, serviceAccount, anonymous]
                      default: anonymous
                    secretRef:
                      type: object
                      required: [name, namespace]
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
