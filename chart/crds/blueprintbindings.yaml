apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: blueprintbindings.core.platformspec.io
spec:
  group: core.platformspec.io
  names:
    kind: BlueprintBinding
    listKind: BlueprintBindingList
    plural: blueprintbindings
    singular: blueprintbinding
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Platform
          type: string
          jsonPath: .spec.platformRef.name
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [platformRef]
              properties:
                platformRef:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                selectors:
                  type: object
                  properties:
                    environmentSelector:
                      type: object
                      properties:
                        matchLabels:
                          type: object
                          additionalProperties:
                            type: string
                    clusterSelector:
                      type: object
                      properties:
                        matchLabels:
                          type: object
                          additionalProperties:
                            type: string
                    locationSelector:
                      type: object
                      properties:
                        matchLabels:
                          type: object
                          additionalProperties:
                            type: string
                deletionPolicy:
                  type: string
                  enum: [Delete, Orphan]
                precedence:
                  type: integer
                  default: 100
                blueprintMappings:
                  type: array
                  items:
                    type: object
                    required: [capability, blueprint]
                    properties:
                      capability:
                        type: string
                      blueprint:
                        type: object
                        required: [name]
                        properties:
                          name:
                            type: string
                          registry:
                            type: string
                          location:
                            type: string
                          version:
                            type: string
                          config:
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
