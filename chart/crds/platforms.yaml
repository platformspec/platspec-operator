apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: platforms.core.platformspec.io
spec:
  group: core.platformspec.io
  names:
    kind: Platform
    listKind: PlatformList
    plural: platforms
    singular: platform
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                organization:
                  type: string
                description:
                  type: string
                author:
                  type: string
                version:
                  type: string
                contactEmail:
                  type: string
                resourceSelector:
                  type: object
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                requirements:
                  type: object
                  properties:
                    general:
                      type: object
                      properties:
                        cloudProvider:
                          type: string
                        securityLevel:
                          type: string
                        complianceNeeds:
                          type: array
                          items:
                            type: string
                    capabilities:
                      type: array
                      items:
                        type: string
                    resources:
                      type: array
                      items:
                        type: object
                        required: [kind, minimum]
                        properties:
                          kind:
                            type: string
                          minimum:
                            type: integer
                          maximum:
                            type: integer
                          categories:
                            type: array
                            items:
                              type: string
                dns:
                  type: object
                  properties:
                    providerRef:
                      type: object
                      required: [name]
                      properties:
                        name:
                          type: string
                    domain:
                      type: string
                deletionPolicy:
                  type: string
                  enum: [Delete, Orphan]
                  default: Delete
                overrides:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
