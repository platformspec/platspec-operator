apiVersion: design.platformspec.io/v1alpha1
kind: Blueprint

metadata:
  name: broken-kcl-syntax
  capability: broken-kcl-syntax
  version: 0.1.0
  description: >
    Intentionally broken blueprint for testing operator error handling.
    This blueprint has a KCL syntax error and should never produce output.
    It exists so integration and unit tests can verify that the operator
    records Rendered=False, does not crash, and allows other bindings to
    continue reconciling normally.
  author: FoundationIO
  maintainer: blueprints@foundation.io
  providers: []
  minOperatorVersion: 0.1.0
  tags:
    - testing
    - error-handling

inputs:
  context:
    required: []
    optional: []

outputs:
  generates: []

status:
  target: Platform
  fields: []
