apiVersion: design.platformspec.io/v1alpha1
kind: Blueprint

metadata:
  name: namespace-bootstrap
  capability: namespace-bootstrap
  version: 0.1.0
  description: >
    Creates a platform namespace and a lightweight Deployment to verify the
    Platspec Operator pipeline end-to-end. Exercises KCL execution, server-side
    apply, and async status evaluation with no cloud provider or remote cluster
    required — runs against the local management cluster only.
  author: FoundationIO
  maintainer: blueprints@foundation.io
  providers: []
  minOperatorVersion: 0.1.0
  tags:
    - local
    - development
    - smoke-test

inputs:
  context:
    required:
      - platform
      - environment
    optional: []

  config:
    - field: replicas
      type: int
      default: 1
      description: Number of echo Deployment replicas.

    - field: image
      type: string
      default: "nginx:latest"
      description: Container image for the echo Deployment. Must run as non-root.

outputs:
  generates:
    - apiVersion: v1
      kind: Namespace
    - apiVersion: apps/v1
      kind: Deployment

status:
  target: Platform

  fields:
    - field: ready
      type: bool
      description: True when all desired Deployment replicas are ready.
      expr: |
        deploy  = childResources["apps/v1/Deployment"][0]
        desired = deploy.spec.replicas if deploy?.spec?.replicas else 1
        ready   = deploy.status.readyReplicas if deploy?.status?.readyReplicas else 0
        ready >= desired

    - field: phase
      type: string
      description: Deployment availability condition reason (e.g. MinimumReplicasAvailable, Progressing).
      expr: |
        deploy = childResources["apps/v1/Deployment"][0]
        conds  = deploy.status.conditions if deploy?.status?.conditions else []
        avail  = [c for c in conds if c.type == "Available"]
        avail[0].reason if len(avail) > 0 else "Progressing"

    - field: readyReplicas
      type: int
      description: Number of replicas currently ready.
      expr: |
        deploy = childResources["apps/v1/Deployment"][0]
        deploy.status.readyReplicas if deploy?.status?.readyReplicas else 0

    - field: namespace
      type: string
      description: Name of the provisioned namespace.
      expr: |
        ns = childResources["v1/Namespace"][0]
        ns.metadata.name

    - field: failureReason
      type: string
      description: Non-empty if the Deployment is stalled or has failed to progress.
      expr: |
        deploy = childResources["apps/v1/Deployment"][0]
        conds  = deploy.status.conditions if deploy?.status?.conditions else []
        stall  = [c for c in conds if c.type == "Progressing" and c.status == "False"]
        stall[0].reason if len(stall) > 0 else ""
